name: eddy
description: A calm pocket in the turbulence. ADHD companion app.
publish_to: none

version: 0.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.1

  # Animations
  flutter_animate: ^4.5.0

  # Audio (ambient sounds)
  audioplayers: ^6.0.0

  # Local storage (Momentum habits)
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Fonts
  google_fonts: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.3.0

  # Journal
  image_picker: ^1.1.2
  record: ^6.0.0
  path_provider: ^2.1.4
  local_auth: ^2.3.0
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1

  # Google Drive backup
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/brand/
    - assets/icons/nav/
    - assets/icons/regulate/
    - assets/icons/focus_sounds/
    - assets/icons/theme/
    - assets/illustrations/
